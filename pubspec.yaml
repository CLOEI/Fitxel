name: fitxel
description: "Fitxel - Exergaming Gamification App"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.22.0
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/Clouds/Clouds 1/
    - assets/images/Character/16x32/